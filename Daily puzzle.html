<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daily Shards puzzle!</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #2c3e50; color: white; padding: 20px; }
        .board { display: grid; grid-template-columns: repeat(8, 50px); grid-template-rows: repeat(8, 50px); margin: 20px auto; width: 400px; border: 5px solid #34495e; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .square { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        .selected { background-color: #f1c40f !important; }
        .square img { width: 85%; height: 85%; pointer-events: none; }
        .white { background-color: #ecf0f1; }
        .black { background-color: #95a5a6; }
        .square:hover { filter: brightness(1.2); }
        #win-form { display: none; background: #27ae60; padding: 20px; border-radius: 10px; width: 400px; margin: 20px auto; }
        input { padding: 10px; border-radius: 5px; border: none; margin: 5px; }
        button { padding: 10px 20px; border-radius: 5px; border: none; margin: 5px; background-color: #2ecc71; color: white; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #27ae60; }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; opacity: 0.7; }
    </style>
</head>
<body>

    <h1>Daily puzzle for Shards 14-05-2026</h1>
    <p id="instruction">Black to move! Deliver mate in 5.</p>

    <div class="board" id="chess-board"></div>

    <div id="win-form">
        <h2>Well done!</h2>
        <input type="text" id="winner-name" placeholder="Your Lichess name...">
        <button id="claim-button" onclick="sendToSheet()">Claim Shards!</button>
    </div>

    <script>
        let puzzleData = [
            ['wK','','wR','','wQ','wB','','wR'],
            ['','wP','','wB','wN','','wP','wP'], 
            ['','','','wP','','wN','',''], 
            ['','bP','','bP','wP','wP','',''],
            ['','','','','bP','','',''],
            ['','','','bB','','bP','',''],
            ['','bP','bP','','','','bP','bP'],
            ['','','','bK','bQ','','bN','bR']  
        ];

        const solution = [
            "7-4 to 3-0",
            "3-1 to 2-1",
            "3-3 to 2-2",
            "3-0 to 1-0",
            "1-0 to 0-0" 
        ]; 

        let currentStep = 0;
        let selectedSquare = null;

        function getPieceUrl(piece) {
            if (!piece) return null;
            const baseUrl = "https://upload.wikimedia.org/wikipedia/commons/";
            const pieces = {
                'wK': "4/42/Chess_klt45.svg", 'wQ': "1/15/Chess_qlt45.svg", 'wR': "7/72/Chess_rlt45.svg",
                'wB': "b/b1/Chess_blt45.svg", 'wN': "7/70/Chess_nlt45.svg", 'wP': "4/45/Chess_plt45.svg",
                'bK': "f/f0/Chess_kdt45.svg", 'bQ': "4/47/Chess_qdt45.svg", 'bR': "f/ff/Chess_rdt45.svg",
                'bB': "9/98/Chess_bdt45.svg", 'bP': "c/c7/Chess_pdt45.svg", 'bN': "e/ef/Chess_ndt45.svg"
            };
            return baseUrl + pieces[piece];
        }

        function drawBoard() {
            const board = document.getElementById('chess-board');
            board.innerHTML = "";
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const square = document.createElement('div');
                    square.className = `square ${(r + c) % 2 !== 0 ? 'black' : 'white'}`;
                    if (selectedSquare && selectedSquare.r === r && selectedSquare.c === c) square.classList.add('selected');
                    
                    const piece = puzzleData[r][c];
                    if (piece) {
                        const img = document.createElement('img');
                        img.src = getPieceUrl(piece);
                        square.appendChild(img);
                    }
                    square.onclick = () => handleSquareClick(r, c);
                    board.appendChild(square);
                }
            }
        }

        function playWhiteResponse(step) {
            setTimeout(() => {
                if (step === 1) { 
                    puzzleData[0][0] = ''; puzzleData[0][1] = 'wK'; 
                } else if (step === 2) { 
                    puzzleData[1][4] = ''; puzzleData[2][2] = 'wN'; 
                } else if (step === 3) { 
                    puzzleData[0][2] = ''; puzzleData[2][2] = 'wR'; 
                } else if (step === 4) { 
                    puzzleData[0][1] = ''; puzzleData[0][2] = 'wK'; 
                }
                drawBoard();
            }, 600);
        }

        function handleSquareClick(r, c) {
            if (!selectedSquare) {
                if (puzzleData[r][c] !== '' && puzzleData[r][c].startsWith('b')) {
                    selectedSquare = { r, c };
                    drawBoard();
                }
                return;
            }

            const moveAttempt = `${selectedSquare.r}-${selectedSquare.c} to ${r}-${c}`;

            if (moveAttempt === solution[currentStep]) {
                const piece = puzzleData[selectedSquare.r][selectedSquare.c];
                puzzleData[selectedSquare.r][selectedSquare.c] = ''; 
                puzzleData[r][c] = piece; 
                
                currentStep++;
                selectedSquare = null;

                if (currentStep === solution.length) {
                    drawBoard();
                    document.getElementById('win-form').style.display = 'block';
                } else {
                    drawBoard();
                    playWhiteResponse(currentStep); // Fixed function call name
                }
            } else {
                alert("Incorrect move. Try again!");
                selectedSquare = null;
                drawBoard();
            }
        }

        async function sendToSheet() {
            const naamInput = document.getElementById('winner-name');
            const btn = document.getElementById('claim-button');
            const naam = naamInput.value;
            const googleUrl = "https://script.google.com/macros/s/AKfycbxbAomECiSd8t174E1kbkHJI7ulYX51Jw5RyPsz-nfPhtxikycK_n_kPM4Cdd3Cdb3Q/exec"; 

            if(!naam) return alert("Please enter a name!");
            btn.disabled = true;
            btn.innerText = "Sending...";
            try {
                await fetch(googleUrl, { method: "POST", mode: "no-cors", body: JSON.stringify({ naam: naam }) });
                alert("User sent!");
                btn.innerText = "Sent!";
                naamInput.value = ""; 
            } catch (error) {
                alert("Error sending. Try again.");
                btn.disabled = false;
                btn.innerText = "Claim Shards!";
            }
        }

        window.onload = drawBoard;
				
		
    </script>
</body>
</html>
