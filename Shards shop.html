        .content {

        }

        .content h2 {

            margin-bottom: 20px;
        }

        .content p {
            font-size: 16px;
            line-height: 1.6;
            color: #3c4043;
            margin-bottom: 20px;
        }

        .content a {
            color: #1a73e8;
            text-decoration: none;
        }
        * {

            box-sizing: border-box;
        }

        body { 
            font-family: 'Open Sans', sans-serif;
            text-align: center; 
            background-color: white;

        }

        aside {
            position: fixed;

            top: 0;
            width: 280px;
            height: 100vh;
            background-color: #202124;
            padding: 40px 24px;
            overflow-y: auto;

            box-sizing: border-box;

        }

        .logo {
            font-size: 22px;
            font-weight: 300;
            color: white;
            margin-bottom: 40px;
            letter-spacing: 0.5px;
        }

        nav a, nav summary {
            display: block;
            color: #bdc1c6;
            text-decoration: none;
            padding: 12px 0;
            font-size: 15px;
            font-weight: 400;
            cursor: pointer;
            transition: color 0.2s;
        }

        nav a:hover, nav a.active, nav summary:hover {
            color: #8ab4f8;
        }

        nav details {

        }

        nav summary {
            list-style: none;
            outline: none;

        nav summary::-webkit-details-marker {

        }

        .sub-menu {
            padding-left: 20px;
            border-left: 1px solid #3c4043;
            margin-bottom: 10px;
        }

        .sub-menu a {

            padding: 8px 0;
        }
   </style>
</head>
<body>
    <aside>
        <div class="logo">GC(V)M</div>
        <nav>
            <a href="index.html">Homepage</a>
            <a href="Training.html">Training</a>
            <a href="Coaches.html">Coaches</a>
            <details>
              <summary>Shards currency ⌵</summary>
              <div class="sub-menu">
                <a href="Shardsintro.html">How to get Shards?</a>
                <a href="Daily puzzle.html">Daily puzzle</a>
                <a href="Shards Shop.html">Shards Shop</a>
              </div>
            </details>
            <a href="Leaders.html">Leaders</a>
            <a href="Current games.html">Current games</a>
            <a href="MoTM.html">MoTM</a>
            <a href="GoTM.html">Game of the month</a>
            <a href="Jobs.html">Special mentions/Jobs</a>
            <details>
              <summary>Updates/News ⌵</summary>
              <div class="sub-menu">
                <a href="Updates.html">Updates</a>
                <a href="News.html">Newspaper</a>
              </div>    
            </details>
            <a href="Contact.html">Contact</a>
        </nav>
    </aside>
        
    <main>
        <div class="banner">
            <h1>GCVM - Shards shop</h1>
        </div>

        <div class="content">
            <div style="background: #24292e; padding: 30px; border-radius: 8px; color: #d1d5da; font-family: 'Inter', -apple-system, sans-serif; border: 1px solid #444d56; max-width: 450px; margin: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.4);">
                
                <h2 style="color: #ffffff; margin-top: 0; font-weight: 600; letter-spacing: -0.5px; border-bottom: 1px solid #444d56; padding-bottom: 15px; font-size: 24px; text-align: center;">Shards Shop</h2>
                
                <div style="margin: 20px 0; text-align: left;">
                    <label style="display: block; margin-bottom: 8px; font-size: 0.85em; color: #959da5; text-transform: uppercase; font-weight: bold;">Lichess Username</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="usernameInput" placeholder="Enter Lichess username..." style="flex-grow: 1; padding: 12px; border-radius: 6px; border: 1px solid #444d56; background: #1f2328; color: white; outline: none; transition: border 0.3s;">
                        <button onclick="checkBalance()" style="background: #444d56; color: #eeeeee; border: none; border-radius: 6px; padding: 0 15px; cursor: pointer; font-size: 0.8em; white-space: nowrap; transition: background 0.2s;">Check Balance</button>
                    </div>
                    <div id="balanceDisplay" style="margin-top: 10px; font-weight: bold; color: #c9d1d9; font-size: 0.9em;"></div>
                </div>

                <div style="display: flex; flex-direction: column; gap: 12px;">
                    
                    <button onclick="buyItem('Daily 5 free Shards', 0)" style="background: #2f363d; color: #e1e4e8; padding: 14px; border: 1px solid #444d56; border-radius: 6px; cursor: pointer; transition: 0.2s; font-weight: 500; text-align: left; display: flex; justify-content: space-between;">
                        <span>Daily 5 free Shards</span>
                        <span style="color: #959da5;">0 Shards</span>
                    </button>

                    <button onclick="buyItem('Tournament Perms for one day', 200)" style="background: #2f363d; color: #e1e4e8; padding: 14px; border: 1px solid #444d56; border-radius: 6px; cursor: pointer; transition: 0.2s; font-weight: 500; text-align: left; display: flex; justify-content: space-between;">
                        <span>Tournament Perms for one day</span>
                        <span style="color: #959da5;">200 Shards</span>
                    </button>
                    
                    <button onclick="buyItem('Analysis Session', 100)" style="background: #2f363d; color: #e1e4e8; padding: 14px; border: 1px solid #444d56; border-radius: 6px; cursor: pointer; transition: 0.2s; font-weight: 500; text-align: left; display: flex; justify-content: space-between;">
                        <span>Analysis Session</span>
                        <span style="color: #959da5;">100 Shards</span>
                    </button>

                    <button onclick="buyItem('Team Message', 500)" style="background: #2f363d; color: #e1e4e8; padding: 14px; border: 1px solid #444d56; border-radius: 6px; cursor: pointer; transition: 0.2s; font-weight: 500; text-align: left; display: flex; justify-content: space-between;">
                        <span>Team Message</span>
                        <span style="color: #959da5;">500 Shards</span>
                    </button>

                    <details style="width: 100%;"> 
                        <summary style="font-family: 'Inter', -apple-system, sans-serif; font-size: 13px; background: #2f363d; color: #e1e4e8; padding: 14px; border: 1px solid #444d56; border-radius: 6px; cursor: pointer; transition: 0.2s; font-weight: 500; text-align: left; display: flex; justify-content: space-between; list-style: none;">
                            <span>Training Passwords</span>
                            <span style="color: #959da5; font-size: 0.8em;">▼</span>
                        </summary>

                        <div style="width: 100%; padding: 10px 0 0 20px; display: flex; flex-direction: column; gap: 8px;">
                            <button onclick="buyItem('Universal training password', 1000)" style="font-family: 'Inter', -apple-system, sans-serif; background: #1f2328; color: #e1e4e8; padding: 12px; border: 1px solid #444d56; border-radius: 6px; cursor: pointer; transition: 0.2s; font-weight: 500; text-align: left; display: flex; justify-content: space-between; width: 100%;">
                                <span>Universal Training Password</span>
                                <span style="color: #959da5;">1000 Shards</span>
                            </button>
                        </div>
                    </details>
                </div>

                <div id="statusMessage" style="margin-top: 20px; font-size: 0.9em; min-height: 24px; color: #959da5; line-height: 1.4; text-align: left;"></div>
            </div>
        </div>
    </main>

    <script>
    // --- CONFIGURATION ---
    const scriptURL = "https://script.google.com/macros/s/AKfycbyULPDUd_5admFfsVefPZsCvQVTkhryaoj-Q1s80Nt0MkXcR4uK0sQ6yPoNwVbTUeub/exec";
    const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTm7tdaXaidF8Cm2yQS0hwOCJhjnnLT1JdGr79IJU0HkER-MigtjsLKCEiQIlY9fIGUGkSli07zeS3R/pub?gid=2015825906&single=true&output=csv";

    async function getBalance(username) {
        try {
            const response = await fetch(csvURL);
            const text = await response.text();
            const rows = text.split(/\r?\n/).map(row => row.split(','));
            
            for (let i = 0; i < rows.length; i++) {
                if (rows[i][0] && rows[i][0].replace(/"/g, "").trim().toLowerCase() === username.toLowerCase()) {
                    return parseInt(rows[i][1]);
                }
            }
            return null;
        } catch (e) { return "error"; }
    }

    async function checkBalance() {
        const name = document.getElementById('usernameInput').value.trim();
        const display = document.getElementById('balanceDisplay');
        if(!name) { display.innerText = "Enter a name first!"; return; }
        
        display.innerText = "Searching...";
        const balance = await getBalance(name);
        
        if(balance === "error") display.innerText = "Error connecting.";
        else if(balance === null) display.innerText = "User not found.";
        else display.innerText = `Current Balance: ${balance} Shards`;
    }

    async function buyItem(itemName, itemPrice) {
        const userField = document.getElementById('usernameInput');
        const status = document.getElementById('statusMessage');
        const member = userField.value.trim();

        if(!member) {
            status.style.color = "#f85149";
            status.innerText = "⚠️ Please enter your username first.";
            return;
        }

        status.style.color = "#d1d5da";
        status.innerText = "Verifying...";

        const userBalance = await getBalance(member);

        if (userBalance === null || userBalance === "error") {
            status.style.color = "#f85149";
            status.innerText = "❌ User not found in Ledger.";
            return;
        }

        if (userBalance < itemPrice) {
            status.style.color = "#f85149";
            status.innerText = `❌ Insufficient Shards (You have ${userBalance}).`;
            return;
        }

        status.innerText = "Processing order...";
        await fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({username: member, item: itemName, price: itemPrice})
        });

        status.style.color = "#79c0ff";
        status.innerText = "✅ Order successful! Admin will update your balance shortly.";
        userField.value = ""; 
        document.getElementById('balanceDisplay').innerText = "";
    }
    </script>
</body>
</html>
