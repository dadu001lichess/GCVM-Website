<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GCVM - Shards shop!</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        main {
            margin-left: 280px; 
            width: calc(100% - 280px);
            min-height: 100vh;
            background-color: white;
        }
        
        hr {
            border: none;
            border-top: 1px solid #dadce0;
            margin: 20px 0;
        }

        .banner {
            height: 200px; 
            background-color: #f1f3f4;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #dadce0;
        }

        .banner h1 {
            font-size: 42px;
            font-weight: 400;
            margin: 0;
            text-align: center;
            color: #3c4043;
        }

        .content {
            max-width: 800px;
            margin: 0 auto; 
            padding: 40px 40px;
            text-align: left;
        }

        .content.1 {
            padding-top: 40px;
            padding-bottom: 10px;
        }

        .content h2 {
            font-size: 28px;
            font-weight: 300;
            color: #202124;
            margin-top: 10px;
        }

        .content p {
            font-size: 16px;
            line-height: 1.6;
            color: #3c4043;
            margin-bottom: 15px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body { 
            font-family: 'Open Sans', sans-serif;
            text-align: center; 
            background-color: white; 
            color: #3c4043; 
            padding: 0;
        }

        aside {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background-color: #202124;
            padding: 40px 24px;
            overflow-y: auto;
            z-index: 1000;
            box-sizing: border-box;
            text-align: left;
        }

        .logo {
            font-size: 22px;
            font-weight: 300;
            color: white;
            margin-bottom: 40px;
            letter-spacing: 0.5px;
        }

        /* Strakke styling voor de loginbox conform de andere pagina's */
        .auth-container {
            margin-bottom: 25px;
        }

        .auth-input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .auth-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #3c4043;
            border-radius: 4px;
            background-color: #303134;
            color: white;
            font-size: 13px;
            box-sizing: border-box;
            outline: none;
        }

        .auth-input::placeholder {
            color: #80868b;
        }

        .auth-btn-container {
            display: flex;
            gap: 6px;
            margin-top: 4px;
        }

        .auth-btn {
            flex: 1;
            padding: 10px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            transition: background-color 0.2s;
        }

        .auth-btn:hover {
            background-color: #1557b0;
        }

        .auth-btn.secondary {
            background-color: #3c4043;
            color: #bdc1c6;
        }

        .auth-btn.secondary:hover {
            background-color: #4f5357;
            color: white;
        }

        .user-info {
            color: #bdc1c6;
            font-size: 14px;
            line-height: 1.4;
        }

        .user-info strong {
            color: #8ab4f8;
            font-size: 15px;
        }

        .badge {
            display: inline-block;
            font-size: 10px;
            padding: 2px 6px;
            background-color: #34a853;
            color: white;
            border-radius: 10px;
            margin-left: 6px;
            vertical-align: middle;
        }

        .admin-action-btn {
            display: block;
            width: 100%;
            padding: 8px;
            margin-top: 10px;
            background-color: #d93025;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }

        .admin-action-btn:hover {
            background-color: #b31412;
        }

        .logout-link {
            display: inline-block;
            color: #f28b82;
            text-decoration: none;
            font-size: 12px;
            margin-top: 8px;
            cursor: pointer;
        }

        .logout-link:hover {
            text-decoration: underline;
        }

        nav {
            border-top: 1px solid #3c4043;
            padding-top: 15px;
        }

        .hidden {
            display: none !important;
        }

        nav a, nav summary {
            display: block;
            color: #bdc1c6;
            text-decoration: none;
            padding: 12px 0;
            font-size: 15px;
            font-weight: 400;
            cursor: pointer;
            transition: color 0.2s;
        }

        nav a:hover, nav a.active, nav summary:hover {
            color: #8ab4f8;
        }

        nav details {
            margin: 0;
        }

        nav summary {
            list-style: none;
            outline: none;
        }

        nav summary::-webkit-details-marker {
            display: none;
        }

        .sub-menu {
            padding-left: 20px;
            border-left: 1px solid #3c4043;
            margin-bottom: 10px;
        }

        .sub-menu a {
            font-size: 14px;
            padding: 8px 0;
        }

        /* Shop Elementen */
        .shop-form {
            background-color: #f8f9fa;
            border: 1px solid #dadce0;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 30px;
        }

        .shop-input {
            width: 100%;
            max-width: 300px;
            padding: 10px 14px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
            margin-bottom: 10px;
        }

        .shop-input:focus {
            border-color: #1a73e8;
        }

        .item-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 20px;
        }

        .shop
