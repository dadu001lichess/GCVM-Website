<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GC(V)M - Play Chess</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <style>
        body {
            font-family: 'Open Sans', sans-serif;
            margin: 0;
            display: flex;
            background-color: white;
        }

        aside {
            width: 280px;
            background-color: #202124; 
            height: 100vh;
            position: fixed;
            padding: 40px 24px;
            box-sizing: border-box;
            overflow-y: auto;
            left: 0;
            top: 0;
        }

        .logo { color: white; font-size: 22px; font-weight: 300; margin-bottom: 20px; letter-spacing: 0.5px; }

        nav a {
            display: block;
            color: #bdc1c6;
            text-decoration: none;
            padding: 12px 0;
            font-size: 15px;
            font-weight: 400;
            transition: color 0.2s;
        }
        nav a:hover, nav a.active { color: #8ab4f8; }

        main {
            margin-left: 280px; 
            width: calc(100% - 280px);
            min-height: 100vh;
            padding: 40px;
            box-sizing: border-box;
        }

        .lobby-container, .game-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .btn {
            padding: 10px 20px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn:hover { background-color: #1557b0; }

        .lobby-list {
            margin-top: 20px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            padding: 15px;
            background-color: #f8f9fa;
        }

        .lobby-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        #my-board {
            width: 400px;
            margin: 20px 0;
        }

        .hidden { display: none !important; }
        
        .game-status {
            font-weight: 600;
            margin-top: 10px;
            color: #3c4043;
        }
    </style>
</head>
<body>

    <aside>
        <div class="logo">GC(V)M</div>
        <nav>
            <a href="index.html">Homepage</a>
            <a href="play.html" class="active">Play Game</a>
            <a href="profileview.html">Profile</a>
            </nav>
    </aside>

    <main>
        <div id="lobby-view" class="lobby-container">
            <h2>GC(V)M Live Schaaklobby</h2>
            <p id="welcome-msg">Laden...</p>
            
            <button class="btn" onclick="createNewChallenge()">🔥 Start een nieuwe uitdaging</button>

            <div class="lobby-list">
                <h3>Openstaande uitdagingen</h3>
                <div id="challenges-list">Geen actieve uitdagingen. Start er zelf een!</div>
            </div>
        </div>

        <div id="game-view" class="game-container hidden">
            <h2>Wedstrijd aan de gang</h2>
            <p id="players-info">Wit: ... vs Zwart: ...</p>
            
            <div id="my-board"></div>
            
            <p id="turn-indicator" class="game-status">Laden van spelstatus...</p>
            <button class="btn" style="background-color: #d93025;" onclick="leaveGame()">Spel Verlaten</button>
        </div>
    </main>

    <script>
        // Jouw Supabase configuratie (overgenomen uit je index.html)
        const SUPABASE_URL = 'https://bonjvtqfndaxproxxacl.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_SbuaIgblKnnOIDHf6KRznw_NZUCUc1u'; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = localStorage.getItem('gcvm_db_session');
        let currentGameId = null;
        let myColor = null;
        let board = null;
        let game = new Chess();
        let gameSubscription = null;

        window.onload = function() {
            if (!currentUser) {
                document.getElementById('welcome-msg').innerHTML = "⚠️ Je moet ingelogd zijn op de <a href='index.html'>Homepage</a> om te kunnen spelen.";
                return;
            }
            document.getElementById('welcome-msg').innerText = `Ingelogd als: ${currentUser}. Daag iemand uit of accepteer een uitdaging!`;
            
            loadLobby();
            listenToLobby();
        };

        // 1. LOBBY LOGICA: Laad alle open uitdagingen
        async function loadLobby() {
            const { data, error } = await supabaseClient
                .from('gcvm_games')
                .select('*')
                .eq('status', 'waiting');

            if (error) return console.error(error);
            displayChallenges(data);
        }

        function displayChallenges(games) {
            const container = document.getElementById('challenges-list');
            container.innerHTML = "";

            if (games.length === 0) {
                container.innerHTML = "Geen actieve uitdagingen. Start er zelf een!";
                return;
            }

            games.forEach(g => {
                const div = document.createElement('div');
                div.className = "lobby-item";
                div.innerHTML = `
                    <span>Uitdaging van <strong>${g.white_player}</strong></span>
                    ${g.white_player !== currentUser ? `<button class="btn" onclick="joinGame('${g.id}')">Speel mee</button>` : `<span>(Wachten...)</span>`}
                `;
                container.appendChild(div);
            });
        }

        // Luister live naar wijzigingen in de lobby
        function listenToLobby() {
            supabaseClient
                .channel('public:gcvm_games')
                .on('postgres_changes', { event: '*', filter: 'status=eq.waiting', table: 'gcvm_games', schema: 'public' }, () => {
                    loadLobby();
                })
                .subscribe();
        }

        // Maak een uitdaging aan (Jij bent wit)
        async function createNewChallenge() {
            const { data, error } = await supabaseClient
                .from('gcvm_games')
                .insert([{ white_player: currentUser, status: 'waiting' }])
                .select()
                .single();

            if (error) return alert("Fout bij aanmaken uitdaging: " + error.message);
            
            // Luister of iemand JOUW uitdaging accepteert
            currentGameId = data.id;
            myColor = 'w';
            
            // Abonneer op dit specifieke spel om te zien wanneer de status verandert naar 'playing'
            listenToSpecificGame(data.id);
            alert("Uitdaging aangemaakt! Wacht tot een tegenstander meedoet...");
        }

        // Accepteer een uitdaging van een ander (Jij bent zwart)
        async function joinGame(gameId) {
            const { data, error } = await supabaseClient
                .from('gcvm_games')
                .update({ black_player: currentUser, status: 'playing' })
                .eq('id', gameId)
                .select()
                .single();

            if (error) return alert("Kon niet deelnemen: " + error.message);
            
            myColor = 'b';
            initGame(data);
        }

        // Luister live naar updates binnen een lopend spel
        function listenToSpecificGame(gameId) {
            if (gameSubscription) gameSubscription.unsubscribe();

            gameSubscription = supabaseClient
                .channel(`game:${gameId}`)
                .on('postgres_changes', { event: 'UPDATE', filter: `id=eq.${gameId}`, table: 'gcvm_games', schema: 'public' }, (payload) => {
                    const updatedGame = payload.new;
                    
                    // Als de status 'playing' wordt en we zitten nog in de lobby, start het spel
                    if (updatedGame.status === 'playing' && document.getElementById('game-view').classList.contains('hidden')) {
                        initGame(updatedGame);
                    } else if (updatedGame.status === 'playing') {
                        // Update de bordpositie op basis van de zet van de tegenstander
                        game.load(updatedGame.fen);
                        board.position(updatedGame.fen);
                        updateTurnIndicator();
                    }
                })
                .subscribe();
        }

        // 2. IN-GAME LOGICA: Start het schaakspel en initialiseer het bord
        function initGame(gameData) {
            currentGameId = gameData.id;
            document.getElementById('lobby-view').classList.add('hidden');
            document.getElementById('game-view').classList.remove('hidden');
            document.getElementById('players-info').innerText = `Wit: ${gameData.white_player} vs Zwart: ${gameData.black_player}`;
            
            game.load(gameData.fen);

            // Configureer het visuele Chessboard.js bord
            const config = {
                draggable: true,
                position: gameData.fen,
                orientation: myColor === 'w' ? 'white' : 'black',
                onDragStart: onDragStart,
                onDrop: onDrop
            };
            
            board = Chessboard('my-board', config);
            updateTurnIndicator();
            
            // Zorg dat de wit-speler ook luistert naar updates
            if (myColor === 'w') {
                listenToSpecificGame(currentGameId);
            }
        }

        // Voorkom dat je stukken sleept als het niet jouw beurt is of als het spel voorbij is
        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;

            // Je mag alleen je eigen kleur verplaatsen
            if ((myColor === 'w' && piece.search(/^b/) !== -1) ||
                (myColor === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }

            // Je mag alleen slepen als je aan de beurt bent
            if ((game.turn() === 'w' && myColor !== 'w') || (game.turn() === 'b' && myColor !== 'b')) {
                return false;
            }
        }

        // Wanneer een stuk wordt losgelaten (een zet wordt gedaan)
        function onDrop (source, target) {
            // Controleer of de zet volgens de schaakregels mag
            const move = game.move({
                from: source,
                to: target,
                promotion: 'q' // Promoveer automatisch naar een Koningin voor de simpelheid
            });

            // Illegale zet
            if (move === null) return 'snapback';

            // Legale zet! Update direct in Supabase
            updateGameDatabase(game.fen());
            updateTurnIndicator();
        }

        // Stuur de nieuwe FEN (bordpositie) naar Supabase
        async function updateGameDatabase(newFen) {
            await supabaseClient
                .from('gcvm_games')
                .update({ fen: newFen })
                .eq('id', currentGameId);
        }

        function updateTurnIndicator() {
            if (game.game_over()) {
                document.getElementById('turn-indicator').innerText = "Game Over!";
                return;
            }
            const turn = game.turn() === 'w' ? 'Wit' : 'Zwart';
            document.getElementById('turn-indicator').innerText = `Beurt: ${turn}`;
        }

        function leaveGame() {
            if (gameSubscription) gameSubscription.unsubscribe();
            document.getElementById('game-view').classList.add('hidden');
            document.getElementById('lobby-view').classList.remove('hidden');
            loadLobby();
        }
    </script>
</body>
</html>
