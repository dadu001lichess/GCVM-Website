<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>GC(V)M - Homepage</title>
    <style>
        /* STAP 1: De basis van de pagina */
        body {
            font-family: 'Open Sans', sans-serif;
            margin: 0;
            display: flex; /* Zet de zijbalk en de inhoud NAAST elkaar */
            background-color: #f0f0f0;
        }

        /* STAP 2: De Zijbalk (het menu) */
        aside {
            width: 260px;
            background-color: #1e1e1e; /* De donkere kleur */
            height: 100vh; /* Maakt de balk net zo hoog als je scherm */
            position: fixed; /* Zorgt dat de balk blijft staan als je scrollt */
            padding: 30px 20px;
            box-sizing: border-box; /* Zorgt dat de padding de balk niet breder maakt */
        }

        .logo { color: white; font-size: 32px; margin-bottom: 50px; font-weight: bold; }
        
        /* De links in je menu */
        nav a { 
            display: block; 
            color: #ccc; 
            text-decoration: none; 
            padding: 10px 0; 
            font-size: 18px; 
        }
        nav a.active { color: #5bb7eb; } /* De blauwe kleur voor 'Homepage' */

        /* STAP 3: De Rechterkant (de 'Main' area) */
        main {
            margin-left: 260px; /* Schuif alles naar rechts om plek te maken voor de zijbalk */
            width: 100%;
            background-color: white; /* De witte achtergrond van je pagina */
            min-height: 100vh;
        }

        /* STAP 4: De Banner (de grote foto bovenin) */
        .banner {
            height: 400px;
            /* We leggen een donker 'masker' over de foto (0.6 zwart) zodat de witte letters opvallen */
            background-image: 
                linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                url('Banner.png'); 
            background-size: cover; /* Zorg dat de foto het hele vak vult */
            background-position: center;
            display: flex;
            align-items: center; /* Tekst verticaal in het midden */
            justify-content: center; /* Tekst horizontaal in het midden */
            color: white;
        }

        .banner h1 { font-size: 50px; text-shadow: 2px 4px 10px rgba(0,0,0,0.5); }

      /* STAP 5: De Content (De tekst onder de foto) */
.content {
    padding: 60px 10%; /* Ruimte aan de zijkanten */
    max-width: 900px;
    margin: 0 auto;
    color: #3c4043; /* De typische Google tekstkleur (donkergrijs) */
}

/* De "About us:" kop */
.content h2 {
    font-family: 'Open Sans', sans-serif;
    font-size: 28px; /* Precieze grootte van Google koppen */
    font-weight: 400; /* Niet te dik, heel strak */
    color: #202124; /* Iets donkerder dan de gewone tekst */
    margin-top: 40px;
    margin-bottom: 16px;
}

/* De gewone tekst alinea's */
.content p {
    font-size: 16px;
    line-height: 1.5; /* De afstand tussen regels voor fijn lezen */
    margin-bottom: 24px;
}

/* De blauwe linkjes */
.content a {
    color: #1a73e8; /* Het specifieke Google-blauw */
    text-decoration: none;
}

.content a:hover {
    text-decoration: underline; /* Alleen een streepje als je eroverheen gaat */
}
        }
    </style>
</head>
<body>

    <aside>
        <div class="logo">GC(V)M</div>
        <nav>
            <a href="#" class="active">Homepage</a>
            <a href="#">Training</a>
            <a href="#">Coaches</a>
        </nav>
    </aside>

    <main>
        <div class="banner">
            <h1>Growing Chess (Variants) Masters</h1>
        </div>

        <div class="content">
            <h2>About us:</h2>
            <p>Hier komt je tekst...</p>
        </div>
    </main>

</body>
</html>
