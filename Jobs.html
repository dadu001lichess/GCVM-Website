<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GCVM - Jobs and Mentions</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        main {
            margin-left: 280px; 
            width: calc(100% - 280px);
            min-height: 100vh;
        }
        
        .banner {
            height: 200px; 
            background-color: #f1f3f4;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #dadce0;
        }

        .banner h1 {
            font-size: 42px;
            font-weight: 400;
            margin: 0;
            text-align: center;
            color: #3c4043;
        }

        .content {
            max-width: 800px;
            margin: 0 auto; 
            padding: 60px 40px;
        }

        .content h2 {
            font-size: 28px;
            font-weight: 300;
            color: #202124;
            margin-bottom: 20px;
        }

        .content p {
            font-size: 16px;
            line-height: 1.6;
            color: #3c4043;
            margin-bottom: 20px;
        }

        .content a {
            color: #1a73e8;
            text-decoration: none;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body { 
            font-family: 'Open Sans', sans-serif;
            text-align: center; 
            background-color: white; 
            color: #3c4043; 
            padding: 0;
        }

        aside {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background-color: #202124;
            padding: 40px 24px;
            overflow-y: auto;
            z-index: 1000;
            box-sizing: border-box;
            text-align: left;
        }

        .logo {
            font-size: 22px;
            font-weight: 300;
            color: white;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .auth-container {
            margin-bottom: 25px;
        }

        .auth-input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .auth-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #3c4043;
            border-radius: 4px;
            background-color: #303134;
            color: white;
            font-size: 13px;
            box-sizing: border-box;
            outline: none;
        }

        .auth-input::placeholder {
            color: #80868b;
        }

        .auth-btn-container {
            display: flex;
            gap: 6px;
            margin-top: 4px;
        }

        .auth-btn {
            flex: 1;
            padding: 10px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            transition: background-color 0.2s;
        }

        .auth-btn:hover {
            background-color: #1557b0;
        }

        .auth-btn.secondary {
            background-color: #3c4043;
            color: #bdc1c6;
        }

        .auth-btn.secondary:hover {
            background-color: #4f5357;
            color: white;
        }

        .user-info {
            color: #bdc1c6;
            font-size: 14px;
            line-height: 1.4;
            text-align: left;
        }

        .user-info strong {
            color: #8ab4f8;
            font-size: 15px;
        }

        .badge {
            display: inline-block;
            font-size: 10px;
            padding: 2px 6px;
            background-color: #34a853;
            color: white;
            border-radius: 10px;
            margin-left: 6px;
            vertical-align: middle;
        }

        .logout-link {
            display: inline-block;
            color: #f28b82;
            text-decoration: none;
            font-size: 12px;
            margin-top: 8px;
            cursor: pointer;
        }

        .logout-link:hover {
            text-decoration: underline;
        }

        nav {
            border-top: 1px solid #3c4043;
            padding-top: 15px;
        }

        .hidden {
            display: none !important;
        }

        nav a, nav summary {
            display: block;
            color: #bdc1c6;
            text-decoration: none;
            padding: 12px 0;
            font-size: 15px;
            font-weight: 400;
            cursor: pointer;
            transition: color 0.2s;
        }

        nav a:hover, nav a.active, nav summary:hover {
            color: #8ab4f8;
        }

        nav details {
            margin: 0;
        }

        nav summary {
            list-style: none;
            outline: none;
        }

        nav summary::-webkit-details-marker {
            display: none;
        }

        .sub-menu {
            padding-left: 20px;
            border-left: 1px solid #3c4043;
            margin-bottom: 10px;
        }

        .sub-menu a {
            font-size: 14px;
            padding: 8px 0;
        }
   </style>
</head>
<body>
    <aside>
        <div class="logo">GC(V)M</div>
        
        <div class="auth-container">
            <div id="login-section" class="auth-input-group">
                <input type="text" id="username-input" class="auth-input" placeholder="Lichess username...">
                <input type="password" id="password-input" class="auth-input" placeholder="Password...">
                <div class="auth-btn-container">
                    <button class="auth-btn" onclick="loginUser()">Login</button>
                    <button class="auth-btn secondary" onclick="registerUser()">Register</button>
                </div>
            </div>
            
            <div id="profile-section" class="hidden">
                <div class="user-info">
                    Logged in as:<br>
                    <strong id="displayed-username">...</strong><span id="admin-badge" class="badge hidden">Admin</span><br>
                    <span class="logout-link" onclick="logoutUser()">Log out</span>
                </div>
            </div>
        </div>

        <nav>
            <a href="index.html">Homepage</a>
            <a href="Training.html">Training</a>
            <a href="Coaches.html">Coaches</a>
            <details>
              <summary>Shards currency ⌵</summary>
              <div class="sub-menu">
                <a href="Shardsintro.html">How to get Shards?</a>
                <a href="Daily puzzle.html">Daily puzzle</a>
                <a href="Shards shop.html">Shards shop</a>
              </div>
            </details>
            <a href="Current games.html">Current games</a>
            <a href="GoTM.html">Game of the month</a>
            <a href="Jobs.html" class="active">Special mentions/Jobs</a>
            <details>
              <summary>Updates/News ⌵</summary>
              <div class="sub-menu">
                <a href="Updates.html">Updates</a>
                <a href="News.html">Newspaper</a>
              </div>    
            </details>
            <details>
              <summary>Community ⌵</summary>
              <div class="sub-menu">
                <a href="Leaders.html">Mods/Leaders</a>
                <a href="Contact.html">Contact</a>
                <a href="MoTM.html">MoTM</a>
              </div>    
            </details>
        </nav>
    </aside>
        
    <main>
        <div class="banner">
            <h1>Jobs and Mentions</h1>
        </div>

        <div class="content">
            <p>Content coming soon!</p>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://bonjvtqfndaxproxxacl.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_SbuaIgblKnnOIDHf6KRznw_NZUCUc1u'; 

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        window.onload = function() {
            const currentSession = localStorage.getItem('gcvm_db_session');
            const currentRole = localStorage.getItem('gcvm_db_role');
            
            if (currentSession) {
                showStyle(currentSession, currentRole);
                updateOnlineStatus(currentSession);
                setInterval(() => updateOnlineStatus(currentSession), 60000);
            }
        };

        async function updateOnlineStatus(username) {
            try {
                await supabaseClient
                    .from('gcvm_users')
                    .update({ last_seen: new Date().toISOString() })
                    .eq('username', username);
            } catch(e) { console.error(e); }
        }

        async function registerUser() {
            const username = document.getElementById('username-input').value.trim();
            const password = document.getElementById('password-input').value.trim();

            if (!username || !password) {
                alert("Please fill in both fields!");
                return;
            }

            try {
                const { data: existingUser } = await supabaseClient
                    .from('gcvm_users')
                    .select('username')
                    .eq('username', username)
                    .maybeSingle();

                if (existingUser) {
                    alert("This username is already registered online!");
                    return;
                }

                const { error } = await supabaseClient
                    .from('gcvm_users')
                    .insert([{ username: username, password: password, role: 'user', bio: 'Hello! I am a proud member of GC(V)M.' }]);

                if (error) throw error;

                alert("Account created successfully in the cloud! You can now log in.");
                document.getElementById('password-input').value = "";
            } catch (err) {
                alert("Database error during registration: " + err.message);
            }
        }

        async function loginUser() {
            const username = document.getElementById('username-input').value.trim();
            const password = document.getElementById('password-input').value.trim();

            if (!username || !password) {
                alert("Please fill in both fields!");
                return;
            }

            try {
                const { data: user, error } = await supabaseClient
                    .from('gcvm_users')
                    .select('*')
                    .eq('username', username)
                    .eq('password', password)
                    .maybeSingle();

                if (error || !user) {
                    alert("Invalid online username or password!");
                    return;
                }

                if (user.is_banned) {
                    alert("This account has been banned from the website.");
                    return;
                }

                localStorage.setItem('gcvm_db_session', user.username);
                localStorage.setItem('gcvm_db_role', user.role);

                showStyle(user.username, user.role);
                updateOnlineStatus(user.username);
            } catch (err) {
                alert("Database error during login: " + err.message);
            }
        }

        function showStyle(username, role) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('profile-section').classList.remove('hidden');
            document.getElementById('displayed-username').innerText = username;

            if (role === 'admin') {
                document.getElementById('admin-badge').classList.remove('hidden');
            }
        }

        function logoutUser() {
            localStorage.removeItem('gcvm_db_session');
            localStorage.removeItem('gcvm_db_role');
            window.location.reload();
        }
    </script>
</body>
</html>
